[pytest]
# pytest configuration for eDNA LPT API testing

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Test paths
testpaths = tests

# Markers for test categorization
markers =
    unit: Unit tests (test individual functions)
    integration: Integration tests (test multiple components)
    api: API endpoint tests
    service: Service layer tests
    client: Client layer tests
    slow: Slow tests (marked for optional execution)
    http: HTTP mode tests
    local: Local mode tests

# Logging
log_cli = false
log_cli_level = INFO

# Timeout (optional, requires pytest-timeout)
# timeout = 300

# Coverage (optional, requires pytest-cov)
# --cov=.
# --cov-report=html
# --cov-report=term-missing
